# @package _global_
project:
  experiment_name: "Ramp_Detection"
  note: "YOLO pose — 4 кутові keypoints рампи (льоток)"

data:
  kaggle_id: "spiowm/bee-monitoring-ramp-detection"
  raw_dir: "datasets/raw/ramp"
  prepared_dir: "datasets/ramp"
  dataset_path: "datasets/ramp/data.yaml"
  nc: 1
  names: ["ramp"]
  kpt_shape: [4, 3]                   # 4 keypoints (x, y, visibility)
  split_strategy: "random"
  val_ratio: 0.2

# --- Гіперпараметри навчання ---
training:
  epochs: 1
  batch: 4
  imgsz: 320
  optimizer: "AdamW"
  lr0: 0.001
  patience: 20
  # --- Аугментації ---
  mosaic: 1.0
  degrees: 0.0
  fliplr: 0.0                         # вимкнено — flip_idx для 4 кутів потребує верифікації
  translate: 0.1
  scale: 0.5
  cache: "ram"

model:
  name: "yolo11s-pose.pt"
