defaults:
  - _self_
  - experiment: bee_pose  # або: ramp_detection

# --- DagsHub / MLflow ---
project:
  dagshub_owner: "spiowm"
  dagshub_repo: "bee-monitoring-system"
  experiment_name: "YOLO_Default"
  note: ""

# --- Інфраструктурні дефолти (не міняються) ---
training:
  seed: 42
  device: ""          # "" = auto (GPU якщо є, інакше CPU)
  workers: 4
  save_period: -1
  project: "runs"
  name: "train_run"
  cache: "ram"

# --- Дані (структурні дефолти) ---
data:
  split_strategy: "random"
  val_ratio: 0.2
  val_hives: []
