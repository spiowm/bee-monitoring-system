services:

  app:
    build: .
    ports:
      - "8000:8000"
    environment:
      - MONGO_URI=mongodb://mongo:27017
    volumes:
      # Models and videos persist on the host — never rebuilt into the image
      - ./backend/data/models:/app/data/models:ro
      - ./backend/data/videos:/app/data/videos
    depends_on:
      mongo:
        condition: service_healthy
    # GPU support (requires nvidia-container-toolkit on the host)
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    restart: unless-stopped

  mongo:
    image: mongo:7
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  mongo_data:
