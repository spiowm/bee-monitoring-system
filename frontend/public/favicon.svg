    <ellipse cx="65" cy="25" rx="15" ry="20" fill="#a0d8ef" opacity="0.8" transform="rotate(30 65 25)" />
    
    <!-- Body -->
    <ellipse cx="50" cy="50" rx="20" ry="35" fill="#f0b429" />
    
    <!-- Stripes -->
